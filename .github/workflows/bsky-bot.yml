name: Bluesky RSS Bot
on:
  schedule:
    # Run every 3 hours.
    - cron: '0 */3 * * *'
  workflow_dispatch: # This allows manually running the workflow from the GitHub actions page
    inputs:
      rss-feed:
        description: 'RSS feed URL'
        required: true
        default: 'https://echojs.com/rss'
      dry-run:
        description: 'Dry run mode'
        required: false
        default: 'false'
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: bsky-bot
  cancel-in-progress: true

jobs:
  rss-to-bluesky:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Ensure bot cache directory exists
        run: mkdir -p .bsky-bot

      - name: Restore rolling bot cache
        uses: actions/cache@v5
        with:
          path: .bsky-bot
          key: bsky-bot-${{ github.run_id }}
          restore-keys: |
            bsky-bot-

      - name: Install dependencies
        run: npm ci

      - name: Post new RSS items to Bluesky
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry-run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          node index.js \
            --rss-feed="${{ github.event.inputs.rss-feed }}" \
            --cache-file="${{ github.workspace }}/.bsky-bot/cache.json" \
            $DRY_RUN_FLAG
        env:
          BSKY_SERVICE: https://bsky.social
          BSKY_HANDLE: ${{ vars.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
